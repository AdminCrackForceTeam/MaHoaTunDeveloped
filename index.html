<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trang Quà Cho Em 💗</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9ac9,#ff6fb3);
text-align:center;
color:white;
overflow-x:hidden;
}

/* container */

.container{
max-width:420px;
margin:auto;
padding:20px;
}

/* title */

h1{
font-size:28px;
}

/* heart */

.heart{
position:fixed;
color:pink;
font-size:20px;
animation:fly 6s linear infinite;
}

@keyframes fly{
0%{transform:translateY(100vh)}
100%{transform:translateY(-100vh)}
}

/* grid */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:20px;
}

.grid10{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-top:20px;
}

/* gift */

.box{
height:80px;
background:white;
color:#ff4fa0;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
transition:0.2s;
}

.box:active{
transform:scale(0.9);
}

.small{
height:60px;
font-size:20px;
}

/* popup */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.card{
background:white;
color:#ff4fa0;
padding:30px;
border-radius:20px;
width:80%;
font-size:20px;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff4fa0;
color:white;
font-size:16px;
}

</style>
</head>

<body>

<div class="container">

<h1>💗 Quà Cho Em 💗</h1>

<p>Mở thử 1 trong 6 hộp quà nhé</p>

<div class="grid" id="giftGrid"></div>

<h2 style="margin-top:40px">🎮 Mini Game Tiền</h2>

<p>Chọn tối đa 3 hộp</p>

<div class="grid10" id="moneyGrid"></div>

</div>

<div class="popup" id="popup">
<div class="card" id="popupText"></div>
</div>

<script>

/* heart effect */

function createHeart(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💗";
heart.style.left=Math.random()*100+"%";
heart.style.fontSize=(20+Math.random()*20)+"px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
}
setInterval(createHeart,500);

/* gift game */

let gifts=[
" Một cây son",
" Một chiếc vòng tay",
" Tự do mua sắm [ 1 món duy nhất ]",
" Một chiếc vòng tay Tự chọn",
" Một bộ quần áo mới ",
" 100 cái hun :))"
];

let giftGrid=document.getElementById("giftGrid");

for(let i=0;i<6;i++){

let box=document.createElement("div");
box.className="box";
box.innerHTML="🎁";

box.onclick=function(){

let gift=gifts[Math.floor(Math.random()*gifts.length)];

showPopup("Em nhận được: "+gift+" 💗");

}

giftGrid.appendChild(box);

}

/* money game */

let money=[

10000,
15000,
20000,
25000,
30000,
35000,
40000,
45000,
50000,
-10000

];

/* random vị trí tiền */

money.sort(()=>Math.random()-0.5);

let moneyGrid=document.getElementById("moneyGrid");

let picked=0;

for(let i=0;i<10;i++){

let box=document.createElement("div");
box.className="box small";
box.innerHTML="🎁";

let value=money[i]; // mỗi hộp có tiền riêng

box.onclick=function(){

if(box.opened) return;

if(picked>=3){
showPopup("Bạn đã chọn đủ 3 hộp rồi 💗");
return;
}

picked++;
box.opened=true;

if(value>0){

showPopup("💰 Trúng "+value.toLocaleString()+" VND");

}else{

showPopup("💸 Mất 10k rồi 😝");

}

box.innerHTML=value>0?"💰":"💸";
box.style.background="#ccc";

};

moneyGrid.appendChild(box);

}

/* popup */

function showPopup(text){

let popup=document.getElementById("popup");
let content=document.getElementById("popupText");

content.innerHTML=text+'<br><button onclick="closePopup()">OK</button>';

popup.style.display="flex";

}

function closePopup(){

document.getElementById("popup").style.display="none";

}

</script>

</body>
</html>
