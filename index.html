function renderQuestions() {
    const container = document.getElementById('questions');
    container.innerHTML = '';
    questionsData.forEach(q => {
        let html = `<div class="question" id="q${q.num}"><div class="question-title">Câu ${q.num}: ${q.text}</div>`;
        if (q.type === "multiple") {
            html += `<div class="options">`;
            q.options.forEach(opt => {
                html += `<label><input type="radio" name="q${q.num}" value="${opt[0]}" onchange="updateAnswered()"> ${opt}</label>`;
            });
            html += `</div>`;
        } else {
            html += `<div class="options">
                <label><input type="radio" name="q${q.num}" value="Đ" onchange="updateAnswered()"> Đúng</label>
                <label><input type="radio" name="q${q.num}" value="S" onchange="updateAnswered()"> Sai</label>
            </div>`;
        }
        html += `</div>`;
        container.innerHTML += html;
    });
}

function updateAnswered() {
    let count = questionsData.filter(q => document.querySelector(`input[name="q${q.num}"]:checked`)).length;
    document.getElementById('answered').textContent = count;
}

function submitExam() {
    let score = 0;
    questionsData.forEach(q => {
        const selected = document.querySelector(`input[name="q${q.num}"]:checked`);
        if (selected && selected.value === q.correct) score++;
    });
    document.getElementById('score').textContent = score;
    alert(`🎉 NỘP BÀI HOÀN TẤT!\n\nBạn được ${score}/40 điểm`);
}

renderQuestions();
