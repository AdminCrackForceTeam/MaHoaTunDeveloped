<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Device Activation</title>

<style>

body{
background:#0f0f0f;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{

background:#1b1b1b;
padding:40px;
border-radius:10px;
text-align:center;
box-shadow:0 0 20px #00ff88;

}

h2{
color:#00ff88;
}

input{

width:250px;
padding:10px;
margin-top:15px;
border:none;
border-radius:5px;
background:#2b2b2b;
color:white;

}

button{

margin-top:20px;
padding:10px 25px;
border:none;
border-radius:5px;
background:#00ff88;
color:black;
font-weight:bold;
cursor:pointer;

}

button:hover{

background:#00cc6a;

}

</style>

</head>

<body>

<div class="box">

<h2>ACTIVATE DEVICE</h2>

<form action="/submit" method="post">

<input name="device" placeholder="Nhập Device ID" required>

<br>

<button type="submit">Gửi</button>

</form>

</div>

</body>
</html>
